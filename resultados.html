<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resultados de la votación</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,700&display=swap');
    :root{
      --bg:#F6F7F6; --card:#ffffff; --ink:#333333; --muted:#6E726E;
      --line:#DCDFDC; --accent:#007934; --accent-d:#00612a; --accent-soft:#E6F0EA;
      --citric:#7AD400; --citric-tint:#E4F6C2;
      --gold:#c9a227; --gold-soft:#f7edcf; --silver:#8f979e; --silver-soft:#eceff1;
      --bronze:#b0773a; --bronze-soft:#f3e5d5;
      --font-display:'Nunito',"Arial Rounded MT Bold",Arial,sans-serif;
      --font-body:'Carlito',Calibri,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);
      font-family:var(--font-body);
      line-height:1.5;-webkit-font-smoothing:antialiased}
    a{text-decoration:none}
    .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    .topbar-rule{height:4px;background:var(--citric)}
    .topbar-inner{max-width:900px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:14px}
    .brandmark{display:flex;align-items:center;gap:10px}
    .brandmark img{height:30px;width:auto;display:block}
    .brandmark .tag{font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--accent);
      letter-spacing:.02em;white-space:nowrap}
    .wrap{max-width:900px;margin:0 auto;padding:28px 16px 80px}
    .nav{display:flex;gap:8px;margin-left:auto}
    .nav a{font-size:13px;font-weight:700;text-decoration:none;color:var(--muted);font-family:var(--font-body);
      padding:8px 16px;border:1.5px solid var(--line);border-radius:999px;background:#fff}
    .nav a.activo{color:#fff;background:var(--accent);border-color:var(--accent)}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .top>div:first-child{flex:1;min-width:220px}
    .rule{width:56px;height:4px;background:var(--citric);border-radius:2px;margin:0 0 14px}
    h1{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--accent)}
    h1 .verde{color:var(--ink)}
    .peso{color:var(--muted);font-size:13px;margin:4px 0 0}
    .refresh{font-size:13px;font-weight:700;font-family:var(--font-display);border:1.5px solid var(--line);background:#fff;color:var(--accent);
      border-radius:999px;padding:9px 16px;cursor:pointer;transition:.15s}
    .refresh:hover{border-color:var(--accent);background:var(--accent-soft)}
    /* KPIs */
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin:0 0 26px}
    .kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;
      border-top:4px solid var(--accent);box-shadow:0 2px 6px rgba(31,33,31,0.05)}
    .kpi:nth-child(2){border-top-color:var(--citric)}
    .kpi:nth-child(3){border-top-color:var(--gold)}
    .kpi:nth-child(4){border-top-color:var(--muted)}
    .kpi .t{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
      font-family:var(--font-display)}
    .kpi .v{font-size:30px;font-weight:800;letter-spacing:-.03em;margin:4px 0;font-family:var(--font-display);color:var(--ink)}
    .kpi .s{font-size:12px;color:var(--muted)}
    /* Podio */
    .podio{display:flex;align-items:flex-end;gap:12px;margin-bottom:8px}
    .pcol{flex:1;display:flex;flex-direction:column}
    .pcard{background:var(--card);border:2px solid var(--line);border-radius:16px 16px 0 0;
      padding:20px 14px;text-align:center;position:relative;border-bottom:0}
    .pcol.oro .pcard{border-color:var(--gold)}
    .pcol.plata .pcard{border-color:var(--silver)}
    .pcol.bronce .pcard{border-color:var(--bronze)}
    .medalla{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-weight:800;font-family:var(--font-display);color:#fff;margin:-36px auto 8px;border:3px solid var(--bg)}
    .oro .medalla{background:var(--gold)} .plata .medalla{background:var(--silver)} .bronce .medalla{background:var(--bronze)}
    .pnombre{font-weight:700;font-family:var(--font-display);font-size:13.5px;min-height:60px;display:flex;align-items:center;justify-content:center;color:var(--ink)}
    .pfinal{font-size:34px;font-weight:800;letter-spacing:-.03em;font-family:var(--font-display)}
    .oro .pfinal{color:var(--gold)} .plata .pfinal{color:var(--silver)} .bronce .pfinal{color:var(--bronze)}
    .pfinal small{font-size:13px;color:var(--muted);font-weight:600}
    .pvotos{font-size:12px;color:var(--muted)}
    .pnota{font-size:11px;color:var(--bronze);font-weight:700;margin-top:4px;min-height:14px}
    .pbase{color:#fff;font-weight:800;font-size:22px;font-family:var(--font-display);text-align:center;border-radius:0 0 12px 12px;
      display:flex;align-items:center;justify-content:center}
    .oro .pbase{background:var(--gold);height:86px}
    .plata .pbase{background:var(--silver);height:58px}
    .bronce .pbase{background:var(--bronze);height:40px}
    /* Resto ranking */
    .resto-t{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:26px 0 10px;
      font-family:var(--font-display)}
    .fila-r{background:var(--card);border:1px solid var(--line);border-radius:14px;
      display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:8px}
    .fila-r .pos{font-weight:800;color:var(--muted);width:30px;font-family:var(--font-display)}
    .fila-r .nom{flex:1;font-weight:700;font-size:14.5px}
    .fila-r .fin{font-weight:800;font-size:19px;color:var(--accent);font-family:var(--font-display)}
    .fila-r .fin small{font-size:11px;color:var(--muted);font-weight:600}
    .fila-r .vts{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 10px;white-space:nowrap}
    .fila-r .flag{font-size:11px;color:var(--bronze);font-weight:700}
    /* Observaciones */
    h2{font-size:18px;font-weight:800;margin:30px 0 10px;font-family:var(--font-display);color:var(--accent)}
    .obs{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--citric);
      border-radius:12px;padding:14px 16px;margin-bottom:8px;font-size:14px}
    .obs .quien{color:var(--muted);font-size:12px;margin-top:4px}
    .obs .rockTag{display:inline-block;font-size:11px;font-weight:700;color:var(--accent);
      background:var(--accent-soft);border-radius:999px;padding:2px 10px;margin-bottom:6px;font-family:var(--font-display)}
    .vacio{color:var(--muted);text-align:center;padding:46px;background:#fff;border:1px solid var(--line);border-radius:16px}
    .cargando{color:var(--muted);text-align:center;padding:46px}
    @media(max-width:640px){
      .podio{flex-direction:column;align-items:stretch}
      .pcol{order:2} .pcol.oro{order:1}
      .pbase{height:34px !important}
      .medalla{margin-top:-16px}
      .pnombre{min-height:0}
      .brandmark .tag{display:none}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brandmark" href="index.html">
        <img src="logo_epm_brand.png" alt="EPM">
        <span class="tag">Big Rocks</span>
      </a>
      <nav class="nav">
        <a href="index.html">Votar</a>
        <a class="activo" href="resultados.html">Resultados</a>
      </nav>
    </div>
    <div class="topbar-rule"></div>
  </div>
  <div class="wrap">
    <div class="rule"></div>
    <div class="top">
      <div>
        <h1>Resultados <span class="verde">de la votación</span></h1>
        <p class="peso" id="pesoTxt"></p>
      </div>
      <button class="refresh" onclick="cargar()">↻ Actualizar</button>
    </div>

    <div id="contenido"><div class="cargando">Cargando resultados…</div></div>
  </div>

  <script src="config.js"></script>
  <script>
    function cargar() {
      document.getElementById('contenido').innerHTML = '<div class="cargando">Cargando…</div>';
      fetch(API_URL + '?action=resultados')
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res && res.ok) pintar(res.data);
          else errorC((res && res.msg) || 'Respuesta inválida.');
        })
        .catch(function (e) { errorC(e.message || String(e)); });
    }

    function errorC(d) {
      document.getElementById('contenido').innerHTML =
        '<div class="vacio" style="color:#b4452f">No se pudieron cargar los resultados.<br><small>' + esc(d) + '</small></div>';
    }

    function pintar(d) {
      document.getElementById('pesoTxt').textContent =
        'Puntaje sobre 100 · Comité ' + d.pesoComite + '% · Público ' + d.pesoPublico + '%';

      var html = '';

      // KPIs
      html += '<div class="kpis">' +
        kpi('Calificaciones', d.totalVotos, 'votos registrados') +
        kpi('Evaluadores', d.votantesUnicos, 'personas únicas') +
        kpi('Big rocks', d.numBigRocks, 'en evaluación') +
        kpi('Promedio global', d.promedioGlobal === null ? '—' : d.promedioGlobal,
            d.numComentarios + ' comentarios escritos') +
      '</div>';

      var conDatos = d.resumen.filter(function (r) { return r.final !== null; });
      var sinDatos = d.resumen.filter(function (r) { return r.final === null; });

      if (!conDatos.length) {
        html += '<div class="vacio">Todavía no hay votos. Comparte el link para empezar.</div>';
      } else {
        // Podio (hasta 3)
        var top = conDatos.slice(0, 3);
        var clases = ['oro', 'plata', 'bronce'];
        var orden = top.length === 3 ? [1, 0, 2] : (top.length === 2 ? [1, 0] : [0]);
        html += '<div class="podio">';
        orden.forEach(function (idx) {
          var r = top[idx];
          var cl = clases[idx];
          html += '<div class="pcol ' + cl + '">' +
            '<div class="pcard">' +
              '<div class="medalla">' + (idx + 1) + '</div>' +
              '<div class="pnombre">' + esc(r.nombre) + '</div>' +
              '<div class="pfinal">' + r.final.toFixed(1) + ' <small>/ 100</small></div>' +
              '<div class="pvotos">' + r.votos + ' votos (' + r.votosComite + ' comité · ' + r.votosPublico + ' público)</div>' +
              '<div class="pnota">' + flag(r.estado) + '</div>' +
            '</div>' +
            '<div class="pbase">' + (idx + 1) + '°</div>' +
          '</div>';
        });
        html += '</div>';

        // Resto del ranking
        var resto = conDatos.slice(3).concat(sinDatos);
        if (resto.length) {
          html += '<div class="resto-t">Resto del ranking</div>';
          resto.forEach(function (r, i) {
            var pos = i + 4;
            html += '<div class="fila-r">' +
              '<div class="pos">' + (r.final === null ? '—' : pos + '°') + '</div>' +
              '<div class="nom">' + esc(r.nombre) +
                (flag(r.estado) ? ' <span class="flag">' + flag(r.estado) + '</span>' : '') + '</div>' +
              '<div class="vts">' + r.votos + ' votos</div>' +
              '<div class="fin">' + (r.final === null ? 'Sin votos' : r.final.toFixed(1) + ' <small>/100</small>') + '</div>' +
            '</div>';
          });
        }
      }

      // Observaciones
      if (d.observaciones && d.observaciones.length) {
        html += '<h2>Observaciones (' + d.observaciones.length + ')</h2>';
        d.observaciones.forEach(function (o) {
          html += '<div class="obs">' +
            '<span class="rockTag">' + esc(corto(o.bigrock)) + '</span><br>' +
            esc(o.texto) +
            '<div class="quien">' + esc([o.nombre, o.area, o.tipo].filter(Boolean).join(' · ')) + '</div>' +
          '</div>';
        });
      }

      document.getElementById('contenido').innerHTML = html;
    }

    function kpi(t, v, s) {
      return '<div class="kpi"><div class="t">' + t + '</div><div class="v">' + v + '</div><div class="s">' + s + '</div></div>';
    }
    function flag(estado) {
      if (estado === 'pendiente comité') return 'Pendiente comité';
      if (estado === 'pendiente público') return 'Pendiente público';
      return '';
    }
    function corto(nombre) {
      var m = String(nombre).match(/^Big Rock \d+/i);
      return m ? m[0] : nombre;
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    cargar();
  </script>
</body>
</html>
