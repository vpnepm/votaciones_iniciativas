<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Votación Big Rocks</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Carlito:ital,wght@0,400;0,700;1,700&display=swap');
    :root{
      --citric:#7AD400; --forest:#007934; --forest-deep:#00opc;
      --bg:#F6F7F6; --card:#ffffff; --ink:#333333; --muted:#6E726E;
      --line:#DCDFDC; --accent:#007934; --accent-d:#00612a; --accent-soft:#E6F0EA;
      --citric-tint:#E4F6C2; --bad:#B23B2E; --gold:#caa53d;
      --font-display:'Nunito',"Arial Rounded MT Bold",Arial,sans-serif;
      --font-body:'Carlito',Calibri,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);
      font-family:var(--font-body);
      line-height:1.5;-webkit-font-smoothing:antialiased}
    a{text-decoration:none}
    .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    .topbar-rule{height:4px;background:var(--citric)}
    .topbar-inner{max-width:760px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;gap:14px}
    .brandmark{display:flex;align-items:center;gap:10px}
    .brandmark img{height:30px;width:auto;display:block}
    .brandmark .tag{font-family:var(--font-display);font-weight:800;font-size:13px;color:var(--forest);
      letter-spacing:.02em;white-space:nowrap}
    .wrap{max-width:760px;margin:0 auto;padding:28px 16px 80px}
    .nav{display:flex;gap:8px;margin-left:auto}
    .nav a{font-size:13px;font-weight:700;text-decoration:none;color:var(--muted);font-family:var(--font-body);
      padding:8px 16px;border:1.5px solid var(--line);border-radius:999px;background:#fff;transition:.15s}
    .nav a.activo{color:#fff;background:var(--forest);border-color:var(--forest)}
    .rule{width:56px;height:4px;background:var(--citric);border-radius:2px;margin:0 0 14px}
    h1{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.01em;
      color:var(--forest);margin:0 0 6px}
    .sub{color:var(--muted);font-size:15px;margin:0 0 24px;max-width:56ch}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px;
      box-shadow:0 2px 6px rgba(31,33,31,0.05)}
    label.f{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px;
      text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-display)}
    input[type=text],select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;
      padding:11px 12px;font:inherit;color:var(--ink);background:#fff;outline:none;transition:.15s}
    input[type=text]:focus,textarea:focus{border-color:var(--forest);box-shadow:0 0 0 3px var(--accent-soft)}
    .fila{display:flex;gap:12px;flex-wrap:wrap}
    .fila>div{flex:1;min-width:180px}
    .tipo{display:flex;gap:8px;margin-top:4px}
    .tipo label{flex:1;position:relative}
    .tipo input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .tipo span{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;
      border:1.5px solid var(--line);border-radius:999px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s;
      font-family:var(--font-display);font-size:14px}
    .tipo input:checked+span{background:var(--forest);border-color:var(--forest);color:#fff}
    .tipo input:focus-visible+span{outline:2px solid var(--citric);outline-offset:2px}
    #cajaCodigo{display:none;margin-top:12px}
    /* Acordeón de big rocks */
    .rock{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;
      box-shadow:0 2px 6px rgba(31,33,31,0.05);transition:box-shadow .15s;border-left:4px solid transparent}
    .rock.abierto{border-left-color:var(--citric);box-shadow:0 6px 18px rgba(31,33,31,0.08)}
    .rock-head{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
    .rock-num{width:36px;height:36px;flex:0 0 36px;border-radius:10px;background:var(--accent-soft);
      color:var(--forest);font-weight:800;font-family:var(--font-display);display:flex;align-items:center;justify-content:center}
    .rock-nombre{font-weight:700;font-family:var(--font-display);font-size:15px;flex:1;color:var(--ink)}
    .rock-estado{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;
      font-family:var(--font-display)}
    .rock-estado.listo{color:var(--forest)}
    .chev{color:var(--muted);transition:.2s}
    .rock.abierto .chev{transform:rotate(180deg);color:var(--forest)}
    .rock-body{display:none;padding:0 18px 18px;border-top:1px solid var(--line)}
    .rock.abierto .rock-body{display:block}
    /* Criterio */
    .crit{border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
    .crit-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .crit-nombre{font-weight:700;font-family:var(--font-display);font-size:14.5px}
    .pts{font-size:12px;font-weight:700;color:var(--forest);background:var(--citric-tint);
      padding:4px 12px;border-radius:999px;white-space:nowrap;font-family:var(--font-display)}
    .escala{display:flex;gap:8px;justify-content:center;margin:6px 0 12px}
    .opt{position:relative}
    .opt input{position:absolute;inset:0;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
    .opt span{display:flex;align-items:center;justify-content:center;width:46px;height:46px;
      border:1.5px solid var(--line);border-radius:12px;font-weight:800;color:var(--muted);
      font-family:var(--font-display);
      transition:.12s;cursor:pointer;user-select:none;background:#fff}
    .opt input:checked+span{background:var(--forest);border-color:var(--forest);color:#fff;
      box-shadow:0 0 0 4px var(--citric-tint)}
    .opt input:focus-visible+span{outline:2px solid var(--citric);outline-offset:2px}
    .anclas{display:flex;gap:10px}
    .anclas div{flex:1;font-size:12.5px;color:var(--muted);background:var(--bg);
      border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .anclas div:last-child{text-align:right}
    .crit.falta{border-color:var(--bad)}
    .crit.falta .crit-nombre::after{content:" • falta";color:var(--bad);font-size:12px}
    .btn-rock{width:100%;border:0;border-radius:999px;background:var(--forest);color:#fff;
      font:inherit;font-family:var(--font-display);font-weight:800;font-size:15px;padding:13px;cursor:pointer;margin-top:16px;
      transition:.15s}
    .btn-rock:hover{background:var(--accent-d)}
    .btn-rock:disabled{opacity:.55;cursor:default}
    .msg-rock{font-size:13.5px;margin-top:8px;min-height:16px}
    .msg-rock.err{color:var(--bad)}
    .msg-rock.okmsg{color:var(--forest);font-weight:600}
    .votado{display:flex;align-items:center;gap:10px;background:var(--citric-tint);
      border-radius:12px;padding:14px;margin-top:14px;color:var(--forest);font-weight:700}
    .cargando{color:var(--muted);text-align:center;padding:40px}
    .reset{display:none;margin-top:14px;font-size:13px;color:var(--muted)}
    .reset button{background:none;border:none;padding:0;font:inherit;color:var(--forest);
      font-weight:700;cursor:pointer;text-decoration:underline}
    .error-caja{border:1px solid var(--bad);color:var(--bad);border-radius:16px;padding:16px;background:#fff}
    @media(max-width:480px){
      .opt span{width:40px;height:40px}
      .anclas{flex-direction:column}
      .anclas div:last-child{text-align:left}
      .brandmark .tag{display:none}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brandmark" href="index.html">
        <img src="logo_epm_brand.png" alt="EPM">
        <span class="tag">Big Rocks</span>
      </a>
      <nav class="nav">
        <a class="activo" href="index.html">Votar</a>
        <a href="resultados.html">Resultados</a>
      </nav>
    </div>
    <div class="topbar-rule"></div>
  </div>
  <div class="wrap">
    <div class="rule"></div>
    <h1>Votación Big Rocks</h1>
    <p class="sub">Ingresa tus datos y califica cada big rock a medida que se expone. Cada criterio se califica de 1 a 5.</p>

    <div class="card">
      <div class="fila">
        <div>
          <label class="f" for="nombre">Nombre</label>
          <input type="text" id="nombre" autocomplete="name" placeholder="Tu nombre">
        </div>
        <div>
          <label class="f" for="area">Área / equipo</label>
          <select id="area">
            <option value="">Selecciona tu área…</option>
          </select>
        </div>
      </div>
      <div style="margin-top:14px">
        <label class="f">Tipo de votante</label>
        <div class="tipo">
          <label><input type="radio" name="tipo" value="Público" checked><span>Participantes</span></label>
          <label><input type="radio" name="tipo" value="Comité"><span>Comité patrocinador</span></label>
        </div>
        <div id="cajaCodigo">
          <label class="f" for="codigo">Código del comité</label>
          <input type="text" id="codigo" inputmode="numeric" placeholder="Código entregado al comité" style="max-width:260px">
        </div>
      </div>
      <div class="reset" id="cajaReset">
        ¿No eres tú? <button type="button" onclick="reiniciarMemoria()">Empezar de nuevo</button>
      </div>
    </div>

    <div id="rocks"><div class="cargando">Cargando big rocks…</div></div>
  </div>

  <script src="config.js"></script>
  <script>
    var CFG = null;
    var votadas = {}; // rockId -> true (persistido en el navegador)
    var CLAVE = null; // clave de localStorage, depende de eventoVersion

    /* ---------- Memoria local (sobrevive refrescos) ---------- */
    function leerMemoria() {
      try { return JSON.parse(localStorage.getItem(CLAVE)) || null; }
      catch (e) { return null; }
    }
    function guardarMemoria() {
      try {
        localStorage.setItem(CLAVE, JSON.stringify({
          nombre: document.getElementById('nombre').value.trim(),
          area: document.getElementById('area').value.trim(),
          tipo: document.querySelector('input[name="tipo"]:checked').value,
          votadas: votadas
        }));
      } catch (e) { /* incógnito o storage lleno: seguimos sin memoria */ }
    }
    function reiniciarMemoria() {
      try { localStorage.removeItem(CLAVE); } catch (e) {}
      location.reload();
    }
    function restaurar() {
      var m = leerMemoria();
      if (!m) return;
      if (m.nombre) document.getElementById('nombre').value = m.nombre;
      if (m.area) document.getElementById('area').value = m.area;
      if (m.tipo) {
        var radio = document.querySelector('input[name="tipo"][value="' + m.tipo + '"]');
        if (radio) { radio.checked = true; }
        document.getElementById('cajaCodigo').style.display = (m.tipo === 'Comité') ? 'block' : 'none';
      }
      votadas = m.votadas || {};
      if (m.nombre || m.area) document.getElementById('cajaReset').style.display = 'block';
      // Marca las ya votadas y abre la primera pendiente
      var abierta = false;
      CFG.bigrocks.forEach(function (b) {
        var el = document.getElementById('rock_' + b.id);
        el.classList.remove('abierto');
        if (votadas[b.id]) {
          var estado = document.getElementById('estado_' + b.id);
          estado.textContent = '✓ Votada'; estado.classList.add('listo');
          el.querySelector('.rock-body').innerHTML =
            '<div class="votado">✓ Tu voto para esta big rock quedó registrado. ¡Gracias!</div>';
        } else if (!abierta) {
          el.classList.add('abierto'); abierta = true;
        }
      });
    }

    document.querySelectorAll('input[name="tipo"]').forEach(function (r) {
      r.addEventListener('change', function () {
        document.getElementById('cajaCodigo').style.display =
          (document.querySelector('input[name="tipo"]:checked').value === 'Comité') ? 'block' : 'none';
        guardarMemoria();
      });
    });
    document.getElementById('nombre').addEventListener('change', guardarMemoria);
    document.getElementById('area').addEventListener('change', guardarMemoria);

    fetch(API_URL + '?action=config')
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (res && res.ok) {
          CFG = res.data;
          CLAVE = 'votoBigRocks_v' + (CFG.eventoVersion || '1');
          pintar();
          restaurar();
        }
        else errorCarga((res && res.msg) || 'Respuesta inválida del servidor.');
      })
      .catch(function (e) { errorCarga(e.message || String(e)); });

    function errorCarga(detalle) {
      document.getElementById('rocks').innerHTML =
        '<div class="error-caja"><b>No se pudieron cargar las big rocks.</b><br>' +
        '<span style="font-size:13px">' + esc(detalle) + '</span></div>';
    }

    function pintar() {
      // Poblar el desplegable de áreas desde la hoja
      var sel = document.getElementById('area');
      (CFG.areas || []).forEach(function (a) {
        var op = document.createElement('option');
        op.value = a; op.textContent = a;
        sel.appendChild(op);
      });

      var cont = document.getElementById('rocks');
      cont.innerHTML = '';
      CFG.bigrocks.forEach(function (rock, i) {
        var div = document.createElement('div');
        div.className = 'rock' + (i === 0 ? ' abierto' : '');
        div.id = 'rock_' + rock.id;

        var critsHtml = CFG.criterios.map(function (c, k) {
          var esc5 = '';
          for (var n = 1; n <= 5; n++) {
            esc5 += '<label class="opt"><input type="radio" name="r' + rock.id + '_c' + c.id +
                    '" value="' + n + '"><span>' + n + '</span></label>';
          }
          return '<div class="crit" id="crit_' + rock.id + '_' + c.id + '">' +
                   '<div class="crit-top"><div class="crit-nombre">' + (k + 1) + '. ' + esc(c.nombre) +
                   '</div><div class="pts">' + c.pts + ' pts</div></div>' +
                   '<div class="escala">' + esc5 + '</div>' +
                   '<div class="anclas"><div>' + esc(c.texto1) + '</div><div>' + esc(c.texto5) + '</div></div>' +
                 '</div>';
        }).join('');

        div.innerHTML =
          '<div class="rock-head" onclick="toggleRock(\'' + rock.id + '\')">' +
            '<div class="rock-num">' + (i + 1) + '</div>' +
            '<div class="rock-nombre">' + esc(rock.nombre) + '</div>' +
            '<div class="rock-estado" id="estado_' + rock.id + '">Pendiente</div>' +
            '<div class="chev">▾</div>' +
          '</div>' +
          '<div class="rock-body">' + critsHtml +
            '<div class="crit" style="border-style:dashed">' +
              '<label class="f" for="obs_' + rock.id + '">Observaciones (opcional)</label>' +
              '<textarea id="obs_' + rock.id + '" rows="3" placeholder="Comentarios sobre esta big rock…"></textarea>' +
            '</div>' +
            '<button class="btn-rock" id="btn_' + rock.id + '" onclick="enviar(\'' + rock.id + '\')">Enviar voto de esta big rock</button>' +
            '<div class="msg-rock" id="msg_' + rock.id + '"></div>' +
          '</div>';
        cont.appendChild(div);
      });
    }

    function toggleRock(id) {
      document.getElementById('rock_' + id).classList.toggle('abierto');
    }

    function enviar(rockId) {
      var nombre = document.getElementById('nombre').value.trim();
      var area = document.getElementById('area').value.trim();
      var tipo = document.querySelector('input[name="tipo"]:checked').value;
      var codigo = document.getElementById('codigo').value.trim();
      var msg = document.getElementById('msg_' + rockId);
      msg.className = 'msg-rock err';

      if (!nombre || !area) { msg.textContent = 'Escribe tu nombre y tu área (arriba).'; return; }
      if (tipo === 'Comité' && !codigo) { msg.textContent = 'Ingresa el código del comité (arriba).'; return; }

      var notas = {}, faltan = false;
      CFG.criterios.forEach(function (c) {
        var sel = document.querySelector('input[name="r' + rockId + '_c' + c.id + '"]:checked');
        var caja = document.getElementById('crit_' + rockId + '_' + c.id);
        if (!sel) { faltan = true; caja.classList.add('falta'); }
        else { caja.classList.remove('falta'); notas[c.nombre] = Number(sel.value); }
      });
      if (faltan) { msg.textContent = 'Califica los 4 criterios de esta big rock.'; return; }

      var btn = document.getElementById('btn_' + rockId);
      btn.disabled = true; btn.textContent = 'Enviando…'; msg.textContent = '';

      var payload = JSON.stringify({
        nombre: nombre, area: area, tipo: tipo, codigo: codigo,
        bigrock: rockId, notas: notas,
        observaciones: document.getElementById('obs_' + rockId).value.trim()
      });

      // Envío con reintentos automáticos: si hay congestión, lo intenta hasta 3 veces solo
      intentarEnvio(payload, rockId, btn, msg, 1);
    }

    function esErrorDeCongestion(texto) {
      return /bloqueo|espera|lock|timeout|conexi/i.test(String(texto || ''));
    }

    function intentarEnvio(payload, rockId, btn, msg, intento) {
      var MAX = 3;
      btn.textContent = intento === 1 ? 'Enviando…' : ('Reintentando (' + intento + ' de ' + MAX + ')…');

      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: payload
      })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res && res.ok) {
            votadas[rockId] = true;
            guardarMemoria();
            marcarVotada(rockId);
          } else if (res && res.msg && res.msg.indexOf('Ya registramos tu voto') === 0) {
            votadas[rockId] = true;
            guardarMemoria();
            marcarVotada(rockId);
          } else if (res && esErrorDeCongestion(res.msg) && intento < MAX) {
            reintentar(payload, rockId, btn, msg, intento);
          } else {
            fallo(btn, msg, (res && res.msg) || 'No se pudo registrar el voto.');
          }
        })
        .catch(function (e) {
          if (intento < MAX) reintentar(payload, rockId, btn, msg, intento);
          else fallo(btn, msg, 'Hay muchos votos entrando al tiempo. Espera unos segundos y vuelve a dar Enviar: tu voto no se pierde.');
        });
    }

    function reintentar(payload, rockId, btn, msg, intento) {
      msg.className = 'msg-rock';
      msg.textContent = 'Muchos votos al tiempo, reintentando automáticamente…';
      var espera = 1500 + Math.random() * 3000; // 1.5 a 4.5 s, aleatorio para descongestionar
      setTimeout(function () { intentarEnvio(payload, rockId, btn, msg, intento + 1); }, espera);
    }

    function fallo(btn, msg, texto) {
      msg.className = 'msg-rock err';
      msg.textContent = texto;
      btn.disabled = false; btn.textContent = 'Enviar voto de esta big rock';
    }

    function marcarVotada(rockId) {
      document.getElementById('cajaReset').style.display = 'block';
      var estado = document.getElementById('estado_' + rockId);
      estado.textContent = '✓ Votada'; estado.classList.add('listo');
      var body = document.querySelector('#rock_' + rockId + ' .rock-body');
      body.innerHTML = '<div class="votado">✓ Tu voto para esta big rock quedó registrado. ¡Gracias!</div>';
      // Colapsa la votada y abre la siguiente pendiente
      document.getElementById('rock_' + rockId).classList.remove('abierto');
      for (var i = 0; i < CFG.bigrocks.length; i++) {
        var id = CFG.bigrocks[i].id;
        if (!votadas[id]) { document.getElementById('rock_' + id).classList.add('abierto'); break; }
      }
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
  </script>
</body>
</html>
